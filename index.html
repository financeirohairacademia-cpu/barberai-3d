<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>BarberAI Academy</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="root">

  <!-- SPLASH -->
  <div id="splash">
    <div id="splash-logo">
      <div id="splash-icon">✦</div>
      <div id="splash-title">BarberAI</div>
      <div id="splash-sub">Academy · Motor de Geometria</div>
    </div>
    <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
    <div id="splash-pct">Iniciando...</div>
  </div>

  <!-- APP -->
  <div id="app" style="display:none">

    <!-- HEADER -->
    <header id="header">
      <div id="header-left">
        <span id="header-icon">✦</span>
        <div>
          <div id="header-title">BarberAI Academy</div>
          <div id="header-cut-name" id="header-sub">Executive</div>
        </div>
      </div>
      <div id="header-right">
        <div id="fps-counter">60 FPS</div>
        <div id="live-badge"><span class="live-dot"></span>LIVE</div>
      </div>
    </header>

    <!-- NAV TABS -->
    <nav id="nav-tabs">
      <button class="nav-tab active" data-tab="geometry">📐 Geometria</button>
      <button class="nav-tab" data-tab="simulate">▶ Simular</button>
      <button class="nav-tab" data-tab="technique">✂ Técnica</button>
      <button class="nav-tab" data-tab="study">📚 Estudar</button>
      <button class="nav-tab" data-tab="ai">🧠 Prof. IA</button>
    </nav>

    <!-- ══ TAB: GEOMETRY ══ -->
    <div id="tab-geometry" class="tab-content active">
      <div id="viewport">
        <canvas id="canvas"></canvas>
        <div id="hud">
          <div id="hud-name"></div>
          <div id="hud-meta"></div>
        </div>
        <div id="cam-controls">
          <button class="cam-btn active" data-view="front">F</button>
          <button class="cam-btn" data-view="left">L</button>
          <button class="cam-btn" data-view="right">R</button>
          <button class="cam-btn" data-view="back">B</button>
          <button class="cam-btn" data-view="top">T</button>
        </div>
        <div id="elev-indicator">
          <div id="elev-arc"></div>
          <div id="elev-value">45°</div>
          <div id="elev-label">ELEVAÇÃO</div>
        </div>
        <div id="drag-hint">👆 arraste para girar</div>
      </div>
      <div id="geo-panel">
        <div id="cuts-scroll-wrap"><div id="cuts-scroll"></div></div>
        <div id="tech-panel"><div id="tech-grid"></div></div>
        <div id="guide-panel">
          <div class="panel-label">Sequência de Execução</div>
          <div id="guide-steps"></div>
        </div>
      </div>
    </div>

    <!-- ══ TAB: SIMULATE ══ -->
    <div id="tab-simulate" class="tab-content">
      <div id="sim-viewport">
        <canvas id="canvas-sim"></canvas>
        <div id="sim-step-overlay">
          <div id="sim-step-num"></div>
          <div id="sim-step-txt"></div>
        </div>
        <div id="sim-cam-controls">
          <button class="cam-btn" data-sim-view="front">F</button>
          <button class="cam-btn" data-sim-view="left">L</button>
          <button class="cam-btn" data-sim-view="right">R</button>
          <button class="cam-btn" data-sim-view="back">B</button>
          <button class="cam-btn" data-sim-view="top">T</button>
        </div>
      </div>
      <div id="sim-panel">
        <div id="sim-progress-wrap">
          <div id="sim-progress-bar"><div id="sim-progress-fill"></div></div>
          <div id="sim-progress-label">Passo <span id="sim-cur">1</span> de <span id="sim-total">5</span></div>
        </div>
        <div id="sim-step-detail"></div>
        <div id="sim-controls">
          <button id="sim-prev" class="sim-btn">← Anterior</button>
          <button id="sim-play" class="sim-btn sim-btn-primary">▶ Play</button>
          <button id="sim-next" class="sim-btn">Próximo →</button>
        </div>
        <div id="sim-tech-row"></div>
      </div>
    </div>

    <!-- ══ TAB: TECHNIQUE ══ -->
    <div id="tab-technique" class="tab-content">
      <div id="technique-content">
        <div id="technique-header">
          <div id="technique-cut-name"></div>
          <div id="technique-cut-desc"></div>
        </div>
        <div id="technique-sections"></div>
      </div>
    </div>

    <!-- ══ TAB: STUDY ══ -->
    <div id="tab-study" class="tab-content">
      <div id="study-content">
        <div id="study-hero">
          <div id="study-hero-icon">📚</div>
          <div id="study-hero-title"></div>
          <div id="study-hero-sub"></div>
        </div>
        <div id="study-sections"></div>
      </div>
    </div>

    <!-- ══ TAB: AI PROFESSOR ══ -->
    <div id="tab-ai" class="tab-content">
      <div id="ai-chat">
        <div id="ai-messages"></div>
        <div id="ai-context-bar">
          <span id="ai-context-cut"></span>
          <span id="ai-context-step"></span>
        </div>
        <div id="ai-input-row">
          <input id="ai-input" type="text" placeholder="Pergunte sobre geometria, técnica, ângulos..."/>
          <button id="ai-send">→</button>
        </div>
        <div id="ai-quick-btns"></div>
      </div>
    </div>

  </div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module" src="main.js"></script>
</body>
</html>
